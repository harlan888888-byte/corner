# 工作流名称：自动创建+本地保存txt（无需SSH、零兼容问题、自动触发）
name: Auto Create TXT (No SSH, Auto Trigger)

# 自动触发（提交master分支自动运行）
on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  create-txt:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 仅创建txt文件，自动触发，无任何SSH/第三方Action
      - name: Create test.txt
        run: |
          echo "Hello GitHub Actions" > test.txt
          echo "自动触发成功！$(date)" >> test.txt
          cat test.txt
