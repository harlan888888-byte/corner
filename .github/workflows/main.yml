# 工作流名称：前端构建并部署到Windows Server 2012（phpstudy+pnpm+彻底跳过Chrome）
name: Frontend Build & Deploy to WinServer2012 (phpstudy)

on:
  push:
    branches: [ master ]
    paths-ignore:
      - '**.md'
      - 'LICENSE'

jobs:
  deploy:
    runs-on: windows-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
          run_install: false

      - name: Install dependencies
        env:
          # 步骤级环境变量，确保Puppeteer拿到，彻底跳过Chrome下载
          PUPPETEER_SKIP_DOWNLOAD: true
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: true
          npm_config_registry: https://registry.npmmirror.com
        run: |
          pnpm install --legacy-peer-deps --no-audit --no-fund
        shell: pwsh
        timeout-minutes: 10

      - name: Build production package
        run: |
          pnpm run build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      - name: Deploy to WinServer2012 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASS }}
          port: 22
          timeout: 30s

          script: |
            $DEPLOY_DIR = "C:\phpstudy_pro\WWW\project\vue_project\front"
            $BACKUP_DIR = "C:\phpstudy_pro\WWW\project\vue_project\Backup\Project_$(Get-Date -Format 'yyyyMMddHHmmss')"
            
            if (Test-Path $DEPLOY_DIR) {
              New-Item -Path $BACKUP_DIR -ItemType Directory -Force
              Copy-Item -Path "$DEPLOY_DIR\*" -Destination $BACKUP_DIR -Recurse -Force
              Write-Host "✅ 旧版本已备份到：$BACKUP_DIR"
            }
            
            Remove-Item -Path "$DEPLOY_DIR\*" -Recurse -Force -ErrorAction SilentlyContinue
            Write-Host "✅ 部署目录已清空：$DEPLOY_DIR"
            
            robocopy "${{ github.workspace }}\dist" "\\${{ secrets.SERVER_HOST }}\C$\phpstudy_pro\WWW\project\vue_project\front" /E /COPYALL /R:3 /W:5 /NP
            Write-Host "✅ 前端文件已复制到服务器部署目录"
            
            if (Test-Path "$DEPLOY_DIR\index.html") {
              Write-Host "🎉 部署成功！可通过phpstudy访问前端项目"
            } else {
              Write-Host "❌ 部署失败！未找到index.html文件"
              exit 1
            }
