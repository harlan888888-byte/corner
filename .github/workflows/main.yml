# 工作流名称：自动上传 txt 文件（纯极简版）
name: Auto Upload TXT (Simple)

# 自动触发（提交master分支自动运行）
on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  upload-txt:
    runs-on: ubuntu-latest
    steps:
      # 仅拉取代码（Actions基础要求）
      - name: Checkout
        uses: actions/checkout@v4

      # 1. 创建txt文件（仅核心内容）
      - name: Create test.txt
        run: echo "Hello GitHub Actions" > test.txt

      # 2. SSH上传txt（无任何验证/if/else）
      - name: Upload via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASS }}
          port: 22
          script: |
            # 仅创建目录 + 上传文件，无任何多余逻辑
            mkdir -p /c/phpstudy_pro/WWW/project/vue_project/front
            scp "${GITHUB_WORKSPACE}/test.txt" "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/c/phpstudy_pro/WWW/project/vue_project/front/test.txt"
