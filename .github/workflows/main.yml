# 工作流名称：自动验证 SSH 连通性（提交代码自动运行）
name: Auto Test SSH Connection

on:
  push:
    branches: [ master ]  # 推送到master分支自动运行
  workflow_dispatch:      # 保留手动触发（可选）

jobs:
  test-ssh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Test SSH Connection to WinServer2012
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASS }}
          port: 22
          timeout: 30s
          command_timeout: 10s

          script: |
            echo "✅ SSH 连接成功！服务器主机名：$(hostname)"
            echo "✅ 当前服务器用户：$(whoami)"
            echo "✅ 服务器系统版本：$(systeminfo | findstr /i "OS Name")"
