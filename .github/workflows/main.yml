# 工作流名称：自动上传 txt 文件（密码登录、零私钥、自动触发）
name: Auto Upload TXT via SSH (Password Only)

# 自动触发（提交master分支自动运行）
on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  upload-txt:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create test.txt
        run: echo "Hello GitHub Actions" > test.txt

      - name: Upload via SSH (Password Only)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASS }}
          port: 22
          timeout: 30s

          # 纯极简脚本，无任何if/else/验证
          script: |
            mkdir -p /c/phpstudy_pro/WWW/project/vue_project/front
            scp "${GITHUB_WORKSPACE}/test.txt" /c/phpstudy_pro/WWW/project/vue_project/front/test.txt
