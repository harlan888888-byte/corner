# 工作流名称：前端CI/CD（无验证、自动触发）
name: Frontend CI/CD (No Validation)

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set Up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Deploy to Server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASS }}
          port: 22
          script: |
            DEPLOY_DIR="/c/phpstudy_pro/WWW/project/vue_project/front"
            TEMP_DIR="/c/phpstudy_pro/WWW/project/vue_project/temp_dist"
            rm -rf "$TEMP_DIR"
            scp -r -O "${{ github.workspace }}/dist/" "$TEMP_DIR/"
            rm -rf "$DEPLOY_DIR/*"
            mv "$TEMP_DIR"/* "$DEPLOY_DIR/"
            rm -rf "$TEMP_DIR"
