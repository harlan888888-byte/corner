name: Frontend Deploy
on:
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/
          # 核心：允许跨workflow下载最新产物（关键！）
          repository: ${{ github.repository }}
          run-id: ${{ github.event.inputs.run_id || github.run_id }}
      - name: Deploy to Server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASS }}
          port: 22
          script: |
            DEPLOY_DIR="/c/phpstudy_pro/WWW/project/vue_project/front"
            TEMP_DIR="/c/phpstudy_pro/WWW/project/vue_project/temp_dist"
            rm -rf "$TEMP_DIR"
            scp -r -O "dist/" "$TEMP_DIR/"
            rm -rf "$DEPLOY_DIR/*"
            mv "$TEMP_DIR"/* "$DEPLOY_DIR/"
            rm -rf "$TEMP_DIR"
