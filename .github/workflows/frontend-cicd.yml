name: Frontend CI/CD
on:
  push:
    branches: [ master ]
  workflow_dispatch:
    inputs:
      deploy_only:
        type: boolean
        description: "仅执行部署（跳过构建）"
        required: false
        default: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取代码
      - uses: actions/checkout@v4

      # 2. 构建前端项目
      - name: 安装依赖并构建
        if: ${{ !github.event.inputs.deploy_only }}
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: pnpm/action-setup@v4
        if: ${{ !github.event.inputs.deploy_only }}
        with:
          version: latest
      - run: pnpm install
        if: ${{ !github.event.inputs.deploy_only }}
      - run: pnpm run build
        if: ${{ !github.event.inputs.deploy_only }}

      # 3. 核心：用 SFTP 直接传文件，完全不用 tar
      - name: 部署到 Windows 服务器（无 tar 依赖）
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          # 服务器信息（和你原来的 secrets 一致）
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASS }}
          host: ${{ secrets.SERVER_HOST }}
          port: 22  # Bitvise 默认端口
          # 本地构建产物路径
          local_path: "./dist/*"
          # 服务器目标路径（Windows 格式：D:/test/ 或 /test/ 都可以）
          remote_path: "/test/"
          # 强制 SFTP 协议，不打包、不解压
          sftp_only: true
          # 可选：是否删除远程原有文件（false 保留，true 清空）
          delete_remote_files: false
          timeout: 60s