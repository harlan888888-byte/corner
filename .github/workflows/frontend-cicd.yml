name: Frontend CI/CD（Windows Server 最终可用版）
on:
  push:
    branches: [ master ]
  workflow_dispatch:
    inputs:
      deploy_only:
        type: boolean
        description: "仅执行部署（跳过构建）"
        required: false
        default: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装依赖并构建
        if: ${{ !github.event.inputs.deploy_only }}
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: pnpm/action-setup@v4
        if: ${{ !github.event.inputs.deploy_only }}
        with:
          version: latest
      - run: pnpm install
        if: ${{ !github.event.inputs.deploy_only }}
      - run: pnpm run build
        if: ${{ !github.event.inputs.deploy_only }}

      - name: 验证dist文件
        run: |
          echo "=== 查看dist目录 ==="
          ls -la $GITHUB_WORKSPACE/dist/ || echo "dist目录不存在！"

      - name: 安装sshpass
        run: sudo apt update && sudo apt install -y sshpass

      # 核心：纯scp传输，不依赖服务器任何工具，彻底规避powershell报错
      - name: 部署到服务器（极简无依赖版）
        run: |
          # 1. 直接用scp递归传输dist（一次性传输，无压缩包，纯密码）
          # 目标路径：直接写你项目的SSH根目录路径（比如 /corner，对应你项目根目录）
          sshpass -p "${{ secrets.SERVER_PASS }}" scp -o StrictHostKeyChecking=no -C -r -P 22 \
            $GITHUB_WORKSPACE/dist/ \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/corner/