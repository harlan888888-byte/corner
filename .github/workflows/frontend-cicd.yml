name: Frontend CI/CD (Windows Server 2012 - 复刻成功版)
on:
  push:
    branches: [ master ]
  workflow_dispatch:
    inputs:
      deploy_only:
        type: boolean
        description: "仅执行部署（需先构建过）"
        required: false
        default: false

jobs:
  build:
    if: ${{ !github.event.inputs.deploy_only }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - run: pnpm install
      - run: pnpm run build
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/
          retention-days: 7

  deploy:
    needs: build
    if: always() && (success() || github.event.inputs.deploy_only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/

      # ========== 第一步：单独传输文件（复刻成功逻辑，用scp-action） ==========
      - name: Upload files to Windows Server 2012
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASS }}
          port: 22
          # 成功关键：source/target是scp-action的原生参数，适配Windows路径
          source: "dist/*"
          target: "C:\\phpstudy_pro\\WWW\\vue_project\\temp_dist"
          # 强制覆盖文件，避免传输失败
          overwrite: true

      # ========== 第二步：单独执行文件操作（复刻成功逻辑，仅执行PowerShell） ==========
      - name: Execute file operations on server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASS }}
          port: 22
          # 仅执行PowerShell文件操作，无任何传输逻辑
          script: |
            C:\Windows\System32\WindowsPowerShell\v1.0\powershell.exe -Command "
              # 定义路径（复刻成功的路径写法）
              \$deployDir = 'C:\phpstudy_pro\WWW\vue_project\front'
              \$tempDir = 'C:\phpstudy_pro\WWW\vue_project\temp_dist'

              # 1. 强制清空部署目录（复刻成功的命令）
              if (Test-Path \$deployDir) {
                Remove-Item -Path \"\$deployDir\*\" -Recurse -Force -ErrorAction SilentlyContinue
              }

              # 2. 强制移动文件（复刻成功的命令）
              Move-Item -Path \"\$tempDir\*\" -Destination \$deployDir -Force

              # 3. 删除临时目录（复刻成功的命令）
              Remove-Item -Path \$tempDir -Recurse -Force -ErrorAction SilentlyContinue

              # 验证：输出部署目录最新文件信息
              Write-Host '部署成功！最新文件：'
              Get-ChildItem -Path \$deployDir | Select-Object Name, LastWriteTime
            "