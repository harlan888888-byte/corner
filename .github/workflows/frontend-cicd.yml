name: Frontend CI/CD（仅保留dist目录）
on:
  push:
    branches: [ master ]
  workflow_dispatch:
    inputs:
      deploy_only:
        type: boolean
        description: "仅执行部署（跳过构建）"
        required: false
        default: false

jobs:
  build:
    if: ${{ !github.event.inputs.deploy_only }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - run: pnpm install
      - run: pnpm run build
      
      # ========== 核心：用锚定语法强制保留dist文件夹 ==========
      - name: 上传dist文件夹（仅保留dist根目录）
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-zip
          # 关键语法：./dist 锚定仓库根目录的dist文件夹，** 递归包含所有内容
          path: |
            ./dist/**
            !./dist/**/*
          retention-days: 7