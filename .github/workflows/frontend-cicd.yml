name: Frontend CI/CD (Build & Deploy Separate)
on:
  push:
    branches: [ master ]
  workflow_dispatch:
    inputs:
      deploy_only:
        type: boolean
        description: "仅执行部署（需先构建过）"
        required: false
        default: false

jobs:
  build:
    if: ${{ !github.event.inputs.deploy_only }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - run: pnpm install
      - run: pnpm run build
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/
          retention-days: 7

  deploy:
    needs: build
    if: always() && (success() || github.event.inputs.deploy_only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/
      # 关键：用Windows Server 2012原生方式部署
      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASS }}
          port: 22
          # 显式调用Windows Server 2012的PowerShell，用原生命令
          script: |
            C:\Windows\System32\WindowsPowerShell\v1.0\powershell.exe -Command "
              # Windows Server 2012 部署路径（按你的实际路径修改）
              $DEPLOY_DIR = 'C:\phpstudy_pro\WWW\vue_project\front'
              $TEMP_DIR = 'C:\phpstudy_pro\WWW\vue_project\temp_dist'
              $GITHUB_DIST = 'dist'

              # 1. 强制创建/清空临时目录
              if (Test-Path $TEMP_DIR) {
                Remove-Item -Path $TEMP_DIR -Recurse -Force -ErrorAction SilentlyContinue
              }
              New-Item -Path $TEMP_DIR -ItemType Directory -Force | Out-Null

              # 2. 用SFTP上传文件（Windows Server 2012 OpenSSH原生支持）
              sftp -o StrictHostKeyChecking=no $env:USERNAME@$env:COMPUTERNAME << EOF
              cd $TEMP_DIR
              put -r $GITHUB_DIST/* .
              EOF

              # 3. 强制清空部署目录（忽略文件占用）
              if (Test-Path $DEPLOY_DIR) {
                Get-ChildItem -Path $DEPLOY_DIR -Recurse | Remove-Item -Force -Recurse -ErrorAction SilentlyContinue
              }

              # 4. 用robocopy强制移动文件（Windows Server 2012原生，解决覆盖问题）
              robocopy $TEMP_DIR $DEPLOY_DIR /E /MIR /R:3 /W:2 /NP

              # 5. 验证部署结果：输出文件修改时间
              Write-Host '部署完成！最新文件信息：'
              Get-ChildItem -Path $DEPLOY_DIR | Select-Object Name, LastWriteTime

              # 6. 清理临时目录
              Remove-Item -Path $TEMP_DIR -Recurse -Force -ErrorAction SilentlyContinue
            "