name: Frontend CI/CD (Build & Deploy Separate)
on:
  push:
    branches: [ master ]
  workflow_dispatch:
    inputs:
      deploy_only:
        type: boolean
        description: "仅执行部署（需先构建过）"
        required: false
        default: false

jobs:
  build:
    if: ${{ !github.event.inputs.deploy_only }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - run: pnpm install
      - run: pnpm run build
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/
          retention-days: 7

  deploy:
    needs: build
    if: always() && (success() || github.event.inputs.deploy_only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/
      - name: Deploy to Server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASS }}
          port: 22
          script: |
            powershell -Command "
              \$DEPLOY_DIR = 'C:\phpstudy_pro\WWW\project\vue_project\front'
              \$TEMP_DIR = 'C:\phpstudy_pro\WWW\project\vue_project\temp_dist'
              
              # 1. 清理临时目录
              if (Test-Path \$TEMP_DIR) { Remove-Item \$TEMP_DIR -Recurse -Force }
              New-Item -Path \$TEMP_DIR -ItemType Directory -Force | Out-Null
              
              # 2. 用sftp上传文件（Windows原生兼容）
              sftp -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} <<EOF
              put -r dist/* \$TEMP_DIR/
              EOF
              
              # 3. 清理部署目录
              if (Test-Path \$DEPLOY_DIR) {
                  Get-ChildItem -Path \$DEPLOY_DIR -Recurse | Remove-Item -Force -Recurse -ErrorAction SilentlyContinue
              }
              
              # 4. 移动文件到部署目录
              Move-Item -Path \$TEMP_DIR/* -Destination \$DEPLOY_DIR -Force
              
              # 5. 删除临时目录
              Remove-Item \$TEMP_DIR -Recurse -Force -ErrorAction SilentlyContinue
            "