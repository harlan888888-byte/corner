name: Frontend CI/CD（确保文件传到服务器）
on:
  push:
    branches: [ master ]
  workflow_dispatch:
    inputs:
      deploy_only:
        type: boolean
        description: "仅执行部署（跳过构建）"
        required: false
        default: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 构建环节
      - name: 安装依赖并构建
        if: ${{ !github.event.inputs.deploy_only }}
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: pnpm/action-setup@v4
        if: ${{ !github.event.inputs.deploy_only }}
        with:
          version: latest
      - run: pnpm install
        if: ${{ !github.event.inputs.deploy_only }}
      - run: pnpm run build
        if: ${{ !github.event.inputs.deploy_only }}

      # 关键：检查dist是否存在且有内容
      - name: 验证dist文件
        run: |
          echo "=== 查看dist目录 ==="
          ls -la $GITHUB_WORKSPACE/dist/ || echo "dist目录不存在！"
          echo "=== 查看工作目录 ==="
          ls -la $GITHUB_WORKSPACE/

      # 安装sshpass（自动填密码）
      - name: 安装sshpass
        run: sudo apt update && sudo apt install -y sshpass

      # 核心：构建机直接推文件到服务器（确保有内容）
      - name: 部署到服务器（真实推送）
        run: |
          # 强制创建服务器目标目录
          sshpass -p "${{ secrets.SERVER_PASS }}" ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "mkdir -p /test"
          # 推送文件（构建机 → 服务器）
          sshpass -p "${{ secrets.SERVER_PASS }}" scp -o StrictHostKeyChecking=no -r -P 22 $GITHUB_WORKSPACE/dist/* ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/test/