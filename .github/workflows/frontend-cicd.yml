name: Frontend CI/CD (Windows Server 2012)
on:
  push:
    branches: [ master ]
  workflow_dispatch:
    inputs:
      deploy_only:
        type: boolean
        description: "仅执行部署（需先构建过）"
        required: false
        default: false

jobs:
  build:
    if: ${{ !github.event.inputs.deploy_only }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - run: pnpm install
      - run: pnpm run build
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/
          retention-days: 7

  deploy:
    needs: build
    if: always() && (success() || github.event.inputs.deploy_only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/
      - name: Deploy to Windows Server 2012
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASS }}
          port: 22
          # 关键：用双反斜杠\\表示Windows路径，避免YAML转义错误
          source: "dist/*"
          target: "C:\\phpstudy_pro\\WWW\\vue_project\\temp_dist"
          # 关键：脚本块用单引号包裹，禁用YAML转义，cmd命令用双反斜杠
          script: |
            del /f /s /q "C:\\phpstudy_pro\\WWW\\vue_project\\front\\*"
            move /y "C:\\phpstudy_pro\\WWW\\vue_project\\temp_dist\\*" "C:\\phpstudy_pro\\WWW\\vue_project\\front\\"
            rmdir /s /q "C:\\phpstudy_pro\\WWW\\vue_project\\temp_dist"