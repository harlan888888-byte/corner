name: Frontend CI/CD
on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      deploy_only:
        type: boolean
        description: '仅执行部署（跳过构建）'
        required: false
        default: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 远程解压 1.tar.gz（带日志校验）
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASS }}
          port: 22
          script: |
            '
            # 1. 输出当前目录（确认路径）
            echo "===== 当前工作目录 ====="
            pwd
            # 2. 列出压缩包所在目录的所有文件（确认1.tar.gz存在）
            echo "===== 压缩包目录文件 ====="
            ls -l /c/phpstudy_pro/WWW/project/vue_project/front/test/
            # 3. 用绝对路径执行tar解压，输出解压过程
            echo "===== 开始解压 ====="
            /c/Windows/System32/tar.exe -zxvf /c/phpstudy_pro/WWW/project/vue_project/front/test/1.tar.gz -C /c/phpstudy_pro/WWW/project/vue_project/front/test
            # 4. 列出解压后目录的文件（看是否有解压结果）
            echo "===== 解压后目录文件 ====="
            ls -l /c/phpstudy_pro/WWW/project/vue_project/front/test/
            # 5. 检查是否有解压后的dist目录（核心校验）
            if [ -d "/c/phpstudy_pro/WWW/project/vue_project/front/test/dist" ]; then
              echo "✅ 解压成功！dist目录已存在"
            else
              echo "❌ 解压失败！未找到dist目录"
              exit 1
            fi
            '