name: Frontend CI/CD（纯密码+无压缩包+直观路径）
on:
  push:
    branches: [ master ]
  workflow_dispatch:
    inputs:
      deploy_only:
        type: boolean
        description: "仅执行部署（跳过构建）"
        required: false
        default: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取代码
      - uses: actions/checkout@v4

      # 2. 构建环节（仅非"仅部署"时执行）
      - name: 安装依赖并构建
        if: ${{ !github.event.inputs.deploy_only }}
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: pnpm/action-setup@v4
        if: ${{ !github.event.inputs.deploy_only }}
        with:
          version: latest
      - run: pnpm install
        if: ${{ !github.event.inputs.deploy_only }}
      - run: pnpm run build
        if: ${{ !github.event.inputs.deploy_only }}

      # 3. 核心：纯密码登录 + 无压缩包 + 直观的源/目标路径
      - name: 部署到服务器（无压缩包直接传）
        uses: appleboy/ssh-action@master
        with:
          # 基础认证（纯密码）
          host: ${{ secrets.SERVER_HOST }}      # 服务器IP
          username: ${{ secrets.SERVER_USER }}  # 服务器用户名
          password: ${{ secrets.SERVER_PASS }}  # 服务器密码（Secrets名：SERVER_PASS）
          port: 22                              # SSH端口（默认22）
          timeout: 60s

          # 核心命令：原生scp（对应source/target，无压缩包）
          script: |
            # 确保服务器目标目录存在（不存在则创建）
            mkdir -p /test
            # 原生scp命令 = source: dist/* + target: /test
            # 解释：
            # $GITHUB_WORKSPACE/dist/* → 本地源路径（对应source: dist/*）
            # /test/ → 服务器目标路径（对应target: /test）
            scp -r -P 22 $GITHUB_WORKSPACE/dist/* ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/test/