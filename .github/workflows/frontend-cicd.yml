name: Frontend CI/CD (仅传输ZIP包到Windows Server 2012)
on:
  push:
    branches: [ master ]
  workflow_dispatch:
    inputs:
      deploy_only:
        type: boolean
        description: "仅执行部署（跳过构建）"
        required: false
        default: false

jobs:
  build:
    if: ${{ !github.event.inputs.deploy_only }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - run: pnpm install
      - run: pnpm run build
      
      # ========== 关键步骤1：将dist目录打包为ZIP（自定义名称，便于识别） ==========
      - name: 打包dist目录为ZIP文件
        run: |
          zip -r frontend-build-$(date +%Y%m%d%H%M%S).zip dist/
          # 查看打包结果，便于调试
          ls -lh *.zip
      
      # ========== 关键步骤2：上传ZIP包到GitHub Artifacts（可选，便于手动下载） ==========
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-zip
          path: ./frontend-build-*.zip
          retention-days: 7

  deploy:
    needs: build
    if: always() && (success() || github.event.inputs.deploy_only)
    runs-on: ubuntu-latest
    steps:
      # ========== 关键步骤3：下载GitHub打包的ZIP产物 ==========
      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist-zip
          path: ./
      
      # ========== 关键步骤4：直接传输ZIP包到Windows服务器指定目录（无后续操作） ==========
      - name: 传输ZIP包到Windows Server 2012指定文件夹
        run: |
          # 原生SCP命令，直接传ZIP包，无任何解压/移动操作
          scp -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            ./frontend-build-*.zip \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:"/cygdrive/c/phpstudy_pro/WWW/vue_project/frontend_dist_package/"