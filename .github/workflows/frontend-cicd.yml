name: Frontend CI/CD
on:
  push:
    branches: [ master ]
  workflow_dispatch:
    inputs:
      deploy_only:
        type: boolean
        description: "仅执行部署（跳过构建）"
        required: false
        default: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取代码
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      # 2. 构建+打包成tar.gz（仅当非「仅部署」时执行）
      - name: 安装 Node.js 环境
        if: ${{ !github.event.inputs.deploy_only }}
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: 安装 pnpm
        if: ${{ !github.event.inputs.deploy_only }}
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: 安装项目依赖
        if: ${{ !github.event.inputs.deploy_only }}
        run: pnpm install --frozen-lockfile

      - name: 构建前端产物
        if: ${{ !github.event.inputs.deploy_only }}
        run: pnpm run build

      - name: 打包 dist 为 tar.gz（带时间戳）
        if: ${{ !github.event.inputs.deploy_only }}
        run: |
          # 生成带时间戳的tar.gz包名，避免覆盖
          PACKAGE_NAME="dist-$(date +%Y%m%d%H%M).tar.gz"
          # 打包dist目录为tar.gz
          tar -zcvf $PACKAGE_NAME ./dist
          # 把包名存入环境变量，供后续SFTP步骤使用
          echo "PACKAGE_NAME=$PACKAGE_NAME" >> $GITHUB_ENV

      # 3. SFTP传输tar.gz包到Windows服务器（仅传压缩包，不解压）
      - name: SFTP传输tar.gz到Windows服务器
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASS }}
          server: ${{ secrets.SERVER_HOST }}
          port: 22
          local_path: "./${{ env.PACKAGE_NAME }}"  # 指向生成的tar.gz包
          remote_path: "/test/"                    # 压缩包会传到C:\test\目录下