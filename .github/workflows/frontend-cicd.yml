name: Frontend CI/CD
on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      deploy_only:
        type: boolean
        description: '仅执行部署（跳过构建）'
        required: false
        default: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取代码
      - uses: actions/checkout@v4

      # 2. 安装依赖并构建（仅非仅部署时执行）
      - name: 安装Node.js
        if: ${{ !github.event.inputs.deploy_only }}
        uses: actions/setup-node@v4
        with:
          node-version: 24
      
      - name: 安装pnpm
        if: ${{ !github.event.inputs.deploy_only }}
        uses: pnpm/action-setup@v4
        with:
          version: latest
      
      - name: 安装依赖
        if: ${{ !github.event.inputs.deploy_only }}
        run: pnpm install
      
      - name: 构建项目
        if: ${{ !github.event.inputs.deploy_only }}
        run: pnpm run build

      # 3. 打包dist为tar.gz（仅非仅部署时执行）
      - name: 打包dist为tar.gz
        if: ${{ !github.event.inputs.deploy_only }}
        run: |
          # 强制生成包名，避免空值
          PACKAGE_NAME="dist-$(date +%Y%m%d%H%M).tar.gz"
          tar -zcvf $PACKAGE_NAME ./dist
          echo "PACKAGE_NAME=$PACKAGE_NAME" >> $GITHUB_ENV
          # 验证包存在
          ls -l $PACKAGE_NAME
          echo "✅ 打包完成，包名：$PACKAGE_NAME"

      # 4. 仅部署模式-强制指定包名（必须确保服务器有这个包）
      - name: 仅部署模式-指定包名
        if: ${{ github.event.inputs.deploy_only }}
        run: |
          # 替换为你服务器上实际存在的包名，比如最新打包的那个
          echo "PACKAGE_NAME=dist-202603210745.tar.gz" >> $GITHUB_ENV
          echo "✅ 仅部署模式，指定包名：${{ env.PACKAGE_NAME }}"

      # 5. 强制校验包名变量（关键：避免空值）
      - name: 校验包名变量
        run: |
          if [ -z "${{ env.PACKAGE_NAME }}" ]; then
            echo "❌ PACKAGE_NAME 为空，部署终止"
            exit 1
          fi
          echo "✅ 包名校验通过：${{ env.PACKAGE_NAME }}"

      # 6. SFTP部署（核心：用Linux风格路径，Bitvise自动映射）
      - name: SFTP部署到Windows服务器
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASS }}
          server: ${{ secrets.SERVER_HOST }}
          port: 22
          local_path: "./${{ env.PACKAGE_NAME }}"
          # 关键：Linux风格路径，Bitvise会映射为 C:\phpstudy_pro\WWW\project\vue_project\front\test
          remote_path: "/phpstudy_pro/WWW/project/vue_project/front/test/"
          sftp_only: true  # 强制仅SFTP，避免SSH干扰
          delete_remote_files: false  # 禁止删除远程文件，避免误操作 

      # 7. 远程解压（复用稳定的解压逻辑）
      - name: 远程解压tar.gz包
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASS }}
          port: 22
          script: |
            cmd /c "cd /d C:\phpstudy_pro\WWW\project\vue_project\front\test && C:\Progra~1\Git\usr\bin\tar.exe -zxvf ${{ env.PACKAGE_NAME }}"