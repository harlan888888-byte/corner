name: Frontend CI/CD
on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      deploy_only:
        type: boolean
        description: '仅执行部署（跳过构建）'
        required: false
        default: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取代码
      - uses: actions/checkout@v4

      # 2. 安装依赖并构建（仅非仅部署时执行）
      - name: 安装Node.js
        if: ${{ !github.event.inputs.deploy_only }}
        uses: actions/setup-node@v4
        with:
          node-version: 24
      
      - name: 安装pnpm
        if: ${{ !github.event.inputs.deploy_only }}
        uses: pnpm/action-setup@v4
        with:
          version: latest
      
      - name: 安装依赖
        if: ${{ !github.event.inputs.deploy_only }}
        run: pnpm install
      
      - name: 构建项目
        if: ${{ !github.event.inputs.deploy_only }}
        run: pnpm run build

      # 3. 打包dist为tar.gz（仅非仅部署时执行）
      - name: 打包dist为tar.gz
        if: ${{ !github.event.inputs.deploy_only }}
        run: |
          PACKAGE_NAME="dist-$(date +%Y%m%d%H%M).tar.gz"
          tar -zcvf $PACKAGE_NAME ./dist
          echo "PACKAGE_NAME=$PACKAGE_NAME" >> $GITHUB_ENV
          # 打印包名，方便调试
          echo "打包完成，包名：$PACKAGE_NAME"

      # 4. 处理仅部署模式的包名（避免变量为空）
      - name: 仅部署模式-指定默认包名
        if: ${{ github.event.inputs.deploy_only }}
        run: |
          # 仅部署时手动指定最新包名（需确保服务器有这个包，或改成你实际的包名）
          echo "PACKAGE_NAME=dist-latest.tar.gz" >> $GITHUB_ENV

      # 5. SFTP部署到Windows服务器（核心修正：Windows风格远程路径）
      - name: SFTP部署到Windows服务器
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASS }}
          server: ${{ secrets.SERVER_HOST }}
          port: 22
          local_path: "./${{ env.PACKAGE_NAME }}"
          # 核心修正：Windows绝对路径（/换成\，指定真实目录）
          remote_path: "C:\\phpstudy_pro\\WWW\\project\\vue_project\\front\\test\\"
          # 可选：开启调试模式，方便排查问题
          sftpArgs: "-vvv"

      # 6. 远程解压（复用之前验证过的解压脚本）
      - name: 远程解压tar.gz包
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASS }}
          port: 22
          script: |
            cmd /c "cd /d C:\phpstudy_pro\WWW\project\vue_project\front\test && tar -zxvf ${{ env.PACKAGE_NAME }}"