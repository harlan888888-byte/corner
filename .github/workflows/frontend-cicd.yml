name: Frontend CI/CD
on:
  push:
    branches: [ master ]  # 推送到master分支自动触发
  workflow_dispatch:     # 手动触发，支持「仅部署」选项
    inputs:
      deploy_only:
        type: boolean
        description: "仅执行部署（跳过构建）"
        required: false
        default: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取代码（无论是否仅部署，都需要拉取代码）
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      # 2. 构建前端项目（仅当非「仅部署」时执行）
      - name: 安装 Node.js 环境
        if: ${{ !github.event.inputs.deploy_only }}
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'  # 缓存pnpm依赖，加速构建

      - name: 安装 pnpm
        if: ${{ !github.event.inputs.deploy_only }}
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: 安装项目依赖
        if: ${{ !github.event.inputs.deploy_only }}
        run: pnpm install --frozen-lockfile  # 锁定依赖版本，避免构建不一致

      - name: 构建前端产物
        if: ${{ !github.event.inputs.deploy_only }}
        run: pnpm run build  # 确保package.json中有build脚本（如vite build/npm run build）

      # 3. SFTP部署到Windows服务器（核心修正：参数名+路径适配）
      - name: SFTP部署到Windows服务器
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          username: ${{ secrets.SERVER_USER }}  # 服务器用户名（如administrator）
          password: ${{ secrets.SERVER_PASS }}  # 服务器登录密码
          server: ${{ secrets.SERVER_HOST }}    # 关键修正：原host→server（该Action的正确参数名）
          port: 22                              # Windows SSH/SFTP默认端口（Bitvise/OpenSSH）
          local_path: "./dist/*"                # 本地构建产物路径（dist下所有文件）
          remote_path: "/test/"                 # Windows路径：/test/对应C:\test\；若要D盘则写/d/test/