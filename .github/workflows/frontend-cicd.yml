name: Frontend CI/CD (Windows Server 2012 - 仅传输压缩包版)
on:
  push:
    branches: [ master ]
  workflow_dispatch:
    inputs:
      deploy_only:
        type: boolean
        description: "仅执行部署（跳过构建）"
        required: false
        default: false

jobs:
  build:
    if: ${{ !github.event.inputs.deploy_only }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - run: pnpm install
      - run: pnpm run build
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/
          retention-days: 7

  deploy:
    needs: build
    if: always() && (success() || github.event.inputs.deploy_only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/

      # ========== 核心修改：直接传输dist目录（非打包）到服务器指定路径 ==========
      - name: 上传构建包到Windows Server 2012（仅传输，不解压）
        uses: appleboy/scp-action@v1.0.0  # 重构版，无tar依赖
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASS }}
          port: 22
          source: "dist/**"  # 传输dist下所有文件
          target: "frontend_dist_package"  # 直接传到这个目录
          overwrite: true
          debug: true  # 开启调试日志，方便看传输结果

