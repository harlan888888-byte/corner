name: Frontend CI/CD
on:
  push:
    branches: [ master ]
  workflow_dispatch:
    inputs:
      deploy_only:
        type: boolean
        description: "仅执行部署（跳过构建）"
        required: false
        default: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取代码
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      # 2. 构建前端项目（仅当非「仅部署」时执行）
      - name: 安装 Node.js 环境
        if: ${{ !github.event.inputs.deploy_only }}
        uses: actions/setup-node@v4
        with:
          node-version: 22  # 建议用稳定版如20，22可能是手误（当前Node 22最新是22.1.0）
          cache: 'pnpm'

      # 核心修复：不用pnpm/action-setup，直接用npm全局装pnpm（100%能找到）
      - name: 手动安装pnpm（全局）
        if: ${{ !github.event.inputs.deploy_only }}
        run: npm install -g pnpm

      - name: 验证pnpm安装
        if: ${{ !github.event.inputs.deploy_only }}
        run: pnpm --version  # 输出版本号，确认安装成功

      - name: 安装项目依赖
        if: ${{ !github.event.inputs.deploy_only }}
        run: pnpm install --frozen-lockfile

      - name: 构建前端产物
        if: ${{ !github.event.inputs.deploy_only }}
        run: pnpm run build

      # 3. 打包 dist 为 tar.gz（带时间戳）
      - name: 打包 dist 为 tar.gz
        if: ${{ !github.event.inputs.deploy_only }}
        run: |
          PACKAGE_NAME="dist-$(date +%Y%m%d%H%M).tar.gz"
          tar -zcvf $PACKAGE_NAME ./dist
          echo "PACKAGE_NAME=$PACKAGE_NAME" >> $GITHUB_ENV

      # 4. SFTP传输tar.gz到Windows服务器
      - name: SFTP传输tar.gz到Windows服务器
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASS }}
          server: ${{ secrets.SERVER_HOST }}
          port: 22
          local_path: "./${{ env.PACKAGE_NAME }}"
          remote_path: "/test/"