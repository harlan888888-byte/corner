name: Frontend CI/CD（Windows Server 极速版）
on:
  push:
    branches: [ master ]
  workflow_dispatch:
    inputs:
      deploy_only:
        type: boolean
        description: "仅执行部署（跳过构建）"
        required: false
        default: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. 构建环节（不变）
      - name: 安装依赖并构建
        if: ${{ !github.event.inputs.deploy_only }}
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: pnpm/action-setup@v4
        if: ${{ !github.event.inputs.deploy_only }}
        with:
          version: latest
      - run: pnpm install
        if: ${{ !github.event.inputs.deploy_only }}
      - run: pnpm run build
        if: ${{ !github.event.inputs.deploy_only }}

      # 2. 验证dist文件（不变）
      - name: 验证dist文件
        run: |
          echo "=== 查看dist目录 ==="
          ls -la $GITHUB_WORKSPACE/dist/ || echo "dist目录不存在！"

      # 3. 安装依赖（不变）
      - name: 安装sshpass和zip
        run: sudo apt update && sudo apt install -y sshpass zip

      # 4. 核心修复：适配Windows Server路径 + 确保目录存在
      - name: 部署到服务器（修复路径+极速）
        run: |
          # ========== 步骤1：构建机打包（1秒完成） ==========
          cd $GITHUB_WORKSPACE
          zip -q -r dist.zip dist/

          # ========== 步骤2：先在服务器创建目录（关键：用Windows原生命令） ==========
          # 用PowerShell创建C:\test目录，避免路径不存在
          sshpass -p "${{ secrets.SERVER_PASS }}" ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "powershell -Command \"New-Item -Path C:\test -ItemType Directory -Force\""

          # ========== 步骤3：传输ZIP包（用SSH映射路径 /c/test，适配Windows） ==========
          sshpass -p "${{ secrets.SERVER_PASS }}" scp -o StrictHostKeyChecking=no -P 22 \
            $GITHUB_WORKSPACE/dist.zip \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/c/test/

          # ========== 步骤4：服务器解压+清理（纯Windows PowerShell命令） ==========
          sshpass -p "${{ secrets.SERVER_PASS }}" ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "powershell -Command \"\
              # 解压ZIP包（覆盖旧文件）
              Expand-Archive -Path C:\test\dist.zip -DestinationPath C:\test -Force; \
              # 删除ZIP包
              Remove-Item -Path C:\test\dist.zip -Force; \
              # 把dist内的文件移动到C:\test根目录
              Get-ChildItem -Path C:\test\dist\* | Move-Item -Destination C:\test -Force; \
              # 删除空的dist文件夹
              Remove-Item -Path C:\test\dist -Recurse -Force \
            \""