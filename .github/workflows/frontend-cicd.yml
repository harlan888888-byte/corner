name: Frontend CI/CD（单层ZIP版）
on:
  push:
    branches: [ master ]
  workflow_dispatch:
    inputs:
      deploy_only:
        type: boolean
        description: "仅执行部署（跳过构建）"
        required: false
        default: false

jobs:
  build:
    if: ${{ !github.event.inputs.deploy_only }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - run: pnpm install
      - run: pnpm run build
      
      # 直接上传dist文件夹，Artifacts自动打包成单层ZIP，无套娃
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist  # 直接传文件夹，不是ZIP包
          retention-days: 7