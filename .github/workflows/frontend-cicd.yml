name: Frontend CI/CD
on:
  push:
    branches: [ master ]
  workflow_dispatch:
    inputs:
      deploy_only:
        type: boolean
        description: "仅执行部署（跳过构建）"
        required: false
        default: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取代码
      - uses: actions/checkout@v4

      # 2. 构建前端项目
      - name: 安装依赖并构建
        if: ${{ !github.event.inputs.deploy_only }}
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: pnpm/action-setup@v4
        if: ${{ !github.event.inputs.deploy_only }}
        with:
          version: latest
      - run: pnpm install
        if: ${{ !github.event.inputs.deploy_only }}
      - run: pnpm run build
        if: ${{ !github.event.inputs.deploy_only }}

      # 3. 部署：修正参数名 + 确保服务器地址正确
      - name: 部署到 Windows 服务器（无 tar 依赖）
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          username: ${{ secrets.SERVER_USER }}    # 服务器用户名
          password: ${{ secrets.SERVER_PASS }}    # 服务器密码
          server: ${{ secrets.SERVER_HOST }}      # 关键：用 server 替代 host
          port: 22                                # Bitvise 默认端口
          local_path: "./dist/*"                  # 本地构建产物路径
          remote_path: "/test/"                   # 服务器目标路径
          sftp_only: true                         # 强制 SFTP 协议
          delete_remote_files: false              # 不删除远程原有文件
          # 移除不支持的 timeout 参数