name: Frontend CI/CD（SMB极速无报错版）
on:
  push:
    branches: [ master ]
  workflow_dispatch:
    inputs:
      deploy_only:
        type: boolean
        description: "仅执行部署（跳过构建）"
        required: false
        default: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. 构建环节（不变）
      - name: 安装依赖并构建
        if: ${{ !github.event.inputs.deploy_only }}
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: pnpm/action-setup@v4
        if: ${{ !github.event.inputs.deploy_only }}
        with:
          version: latest
      - run: pnpm install
        if: ${{ !github.event.inputs.deploy_only }}
      - run: pnpm run build
        if: ${{ !github.event.inputs.deploy_only }}

      # 2. 验证dist文件（不变）
      - name: 验证dist文件
        run: |
          echo "=== 查看dist目录 ==="
          ls -la $GITHUB_WORKSPACE/dist/ || echo "dist目录不存在！"

      # 3. 安装SMB客户端（Ubuntu构建机）
      - name: 安装SMB客户端
        run: sudo apt update && sudo apt install -y cifs-utils

      # 4. 核心：挂载Windows共享目录 + 一次性复制文件（极速）
      - name: 部署到服务器（SMB极速版）
        run: |
          # 第一步：创建本地挂载目录
          mkdir -p /mnt/win_share

          # 第二步：挂载Windows服务器共享目录（关键！）
          # 替换：
          # //服务器IP/共享文件夹名 → 你的Windows共享路径（比如 //1.2.3.4/corner）
          # username=你的Windows用户名
          # password=你的Windows密码
          sudo mount -t cifs //${{ secrets.SERVER_HOST }}/corner /mnt/win_share \
            -o username=${{ secrets.SERVER_USER }},password=${{ secrets.SERVER_PASS }},vers=3.0,dir_mode=0777,file_mode=0777

          # 第三步：一次性复制dist内所有文件到挂载目录（不是逐个传！）
          cp -r $GITHUB_WORKSPACE/dist/* /mnt/win_share/

          # 第四步：卸载挂载目录
          sudo umount /mnt/win_share