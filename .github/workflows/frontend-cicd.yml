name: Frontend CI/CD（精准匹配需求版）
on:
  push:
    branches: [ master ]
  workflow_dispatch:
    inputs:
      deploy_only:
        type: boolean
        description: "仅执行部署（跳过构建）"
        required: false
        default: false

jobs:
  build:
    if: ${{ !github.event.inputs.deploy_only }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - run: pnpm install
      - run: pnpm run build
      
      # ========== 核心：直接上传dist文件夹，关闭Artifacts的路径扁平化 ==========
      - name: 上传dist文件夹（解压即dist/）
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-zip
          path: dist/
          # 关键参数：禁用路径扁平化，强制保留dist根目录
          flatten-paths: false
          retention-days: 7