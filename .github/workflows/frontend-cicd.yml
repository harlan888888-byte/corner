name: Frontend CI/CD
on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      deploy_only:
        type: boolean
        description: '仅执行部署（跳过构建）'
        required: false
        default: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 唤起CMD+切换目录+生成验证文件
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASS }}
          port: 22
          script: |
            cmd /c "cd /d C:\phpstudy_pro\WWW\project\vue_project\front\test && echo 【执行时间】%date% %time% > cmd_verify.txt && echo 【当前目录】%cd% >> cmd_verify.txt && echo 【验证成功】CMD已唤起并切换到目标目录 >> cmd_verify.txt"