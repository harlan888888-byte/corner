name: Frontend CI/CD（仅构建打包，不上传服务器）
on:
  push:
    branches: [ master ]
  workflow_dispatch:
    inputs:
      deploy_only:
        type: boolean
        description: "仅执行部署（跳过构建）"
        required: false
        default: false

jobs:
  build:
    if: ${{ !github.event.inputs.deploy_only }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - run: pnpm install
      - run: pnpm run build
      
      # 打包dist为ZIP，上传到GitHub Artifacts
      - name: 打包并上传ZIP包
        run: |
          zip -r frontend-build.zip dist/
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-zip
          path: ./frontend-build.zip
          retention-days: 7