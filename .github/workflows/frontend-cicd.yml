name: Frontend CI/CD（100%保留dist目录）
on:
  push:
    branches: [ master ]
  workflow_dispatch:
    inputs:
      deploy_only:
        type: boolean
        description: "仅执行部署（跳过构建）"
        required: false
        default: false

jobs:
  build:
    if: ${{ !github.event.inputs.deploy_only }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - run: pnpm install
      - run: pnpm run build
      
      # ========== 核心：手动打包dist为zip，强制保留dist根目录 ==========
      - name: 手动打包dist（解压即dist/）
        run: |
          # 进入dist的上级目录（仓库根目录）
          cd $GITHUB_WORKSPACE
          # 打包dist文件夹，指定dist为压缩包根目录（关键！）
          zip -r frontend-dist-zip.zip dist/
          # 验证打包结果（日志里能看到dist/目录）
          unzip -l frontend-dist-zip.zip
      
      # 上传手动打包好的zip（解压后直接是dist/）
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-zip
          path: $GITHUB_WORKSPACE/frontend-dist-zip.zip
          retention-days: 7