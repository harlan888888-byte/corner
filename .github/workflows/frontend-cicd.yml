- name: 远程解压 1.tar.gz
  uses: appleboy/ssh-action@master
  with:
    host: ${{ secrets.SERVER_HOST }}
    username: ${{ secrets.SERVER_USER }}
    password: ${{ secrets.SERVER_PASS }}
    port: 22
    # 关键：换成你 Git 里 tar.exe 的真实绝对路径
    script: |
      cmd /c "cd /d C:\phpstudy_pro\WWW\project\vue_project\front\test && C:\Program Files\Git\usr\bin\tar.exe -zxvf 1.tar.gz"