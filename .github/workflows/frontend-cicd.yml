name: Frontend CI/CD（终极极速版）
on:
  push:
    branches: [ master ]
  workflow_dispatch:
    inputs:
      deploy_only:
        type: boolean
        description: "仅执行部署（跳过构建）"
        required: false
        default: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. 构建环节（不变）
      - name: 安装依赖并构建
        if: ${{ !github.event.inputs.deploy_only }}
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: pnpm/action-setup@v4
        if: ${{ !github.event.inputs.deploy_only }}
        with:
          version: latest
      - run: pnpm install
        if: ${{ !github.event.inputs.deploy_only }}
      - run: pnpm run build
        if: ${{ !github.event.inputs.deploy_only }}

      # 2. 验证dist文件（不变）
      - name: 验证dist文件
        run: |
          echo "=== 查看dist目录 ==="
          ls -la $GITHUB_WORKSPACE/dist/ || echo "dist目录不存在！"

      # 3. 安装依赖（不变）
      - name: 安装sshpass
        run: sudo apt update && sudo apt install -y sshpass zip

      # 4. 核心：打包成单个ZIP + 传输 + 服务器解压（极速）
      - name: 部署到服务器（终极极速版）
        run: |
          # ========== 步骤1：构建机打包（1秒完成） ==========
          cd $GITHUB_WORKSPACE
          zip -q -r dist.zip dist/  # -q：静默打包，-r：递归打包

          # ========== 步骤2：传输单个ZIP包（核心提速） ==========
          # 单个文件传输，握手仅1次，体积压缩80%+
          sshpass -p "${{ secrets.SERVER_PASS }}" scp -o StrictHostKeyChecking=no -P 22 \
            $GITHUB_WORKSPACE/dist.zip \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:C:/test/

          # ========== 步骤3：服务器端解压（Windows原生命令，无依赖） ==========
          # 用PowerShell解压，覆盖旧文件，删除压缩包
          sshpass -p "${{ secrets.SERVER_PASS }}" ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "powershell -Command \"\
              Expand-Archive -Path C:\test\dist.zip -DestinationPath C:\test -Force; \
              Remove-Item C:\test\dist.zip -Force; \
              # 把dist内的文件移到/test根目录，删除dist文件夹
              Get-ChildItem C:\test\dist\* | Move-Item -Destination C:\test -Force; \
              Remove-Item C:\test\dist -Recurse -Force \
            \""