name: Frontend CI/CD
on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      deploy_only:
        type: boolean
        description: '仅执行部署（跳过构建）'
        required: false
        default: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 仅拉取代码（Action基础要求，无实际业务作用）
      - uses: actions/checkout@v4

      # 核心：远程执行解压 1.tar.gz 命令
      - name: 远程解压服务器的 1.tar.gz 到当前目录
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASS }}
          port: 22
          # 强制CMD执行，精准解压 1.tar.gz 到 test 目录（当前目录）
          script: |
            cmd.exe /c "cd /d C:\phpstudy_pro\WWW\project\vue_project\front\test && tar -zxvf 1.tar.gz"