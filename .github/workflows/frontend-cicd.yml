name: Frontend CI/CD（强制保留dist目录）
on:
  push:
    branches: [ master ]
  workflow_dispatch:
    inputs:
      deploy_only:
        type: boolean
        description: "仅执行部署（跳过构建）"
        required: false
        default: false

jobs:
  build:
    if: ${{ !github.event.inputs.deploy_only }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - run: pnpm install
      - run: pnpm run build
      
      # 关键修复：用**保留目录结构 + 明确指定根目录**
      - name: 上传Artifacts（保留dist根目录）
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-zip
          # 核心语法：dist/** 表示包含dist目录本身 + 所有子文件
          path: |
            dist/**
          # 强制保留目录结构（关键）
          include-hidden-files: true
          retention-days: 7