name: Frontend CI/CD（保留dist目录版）
on:
  push:
    branches: [ master ]
  workflow_dispatch:
    inputs:
      deploy_only:
        type: boolean
        description: "仅执行部署（跳过构建）"
        required: false
        default: false

jobs:
  build:
    if: ${{ !github.event.inputs.deploy_only }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - run: pnpm install
      - run: pnpm run build
      
      # 关键修改：上传dist文件夹本身，保留根目录
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist  # 去掉末尾的/，表示上传dist文件夹（而非文件夹内的文件）
          retention-days: 7