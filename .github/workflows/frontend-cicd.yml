name: Frontend CI/CD (Windows Server 2012)
on:
  push:
    branches: [ master ]
  workflow_dispatch:
    inputs:
      deploy_only:
        type: boolean
        description: "仅执行部署（需先构建过）"
        required: false
        default: false

jobs:
  build:
    if: ${{ !github.event.inputs.deploy_only }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - run: pnpm install
      - run: pnpm run build
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/
          retention-days: 7

  deploy:
    needs: build
    if: always() && (success() || github.event.inputs.deploy_only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/
      - name: Deploy to Windows Server 2012
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASS }}
          port: 22
          # 核心：用source直接上传文件，绕开scp/sftp兼容问题
          source: "dist/*"
          target: "C:\phpstudy_pro\WWW\vue_project\temp_dist"
          # 核心：用Windows原生cmd执行命令，彻底绕开powershell调用问题
          script: |
            # 1. 清空部署目录（cmd原生命令，Windows Server 2012原生支持）
            del /f /s /q "C:\phpstudy_pro\WWW\vue_project\front\*"
            # 2. 移动临时目录文件到部署目录（cmd原生命令）
            move /y "C:\phpstudy_pro\WWW\vue_project\temp_dist\*" "C:\phpstudy_pro\WWW\vue_project\front\"
            # 3. 删除临时目录
            rmdir /s /q "C:\phpstudy_pro\WWW\vue_project\temp_dist"