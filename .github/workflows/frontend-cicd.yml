name: Frontend CI/CD (Windows Server 2012)
on:
  push:
    branches: [ master ]
  workflow_dispatch:
    inputs:
      deploy_only:
        type: boolean
        description: "仅执行部署（需先构建过）"
        required: false
        default: false

jobs:
  build:
    if: ${{ !github.event.inputs.deploy_only }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - run: pnpm install
      - run: pnpm run build
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/
          retention-days: 7

  deploy:
    needs: build
    if: always() && (success() || github.event.inputs.deploy_only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/
      - name: Deploy to Windows Server 2012
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASS }}
          port: 22
          # 1. 用原生source/target上传文件，绕开所有传输坑
          source: dist/
          target: 'C:\phpstudy_pro\WWW\vue_project\temp_dist'
          # 2. 用PowerShell执行，单引号包裹路径，彻底绕开shell解析和YAML转义
          script: |
            $deployDir = 'C:\phpstudy_pro\WWW\vue_project\front'
            $tempDir = 'C:\phpstudy_pro\WWW\vue_project\temp_dist'

            # 强制清空部署目录
            Remove-Item -Path "$deployDir\*" -Recurse -Force -ErrorAction SilentlyContinue
            # 强制移动文件
            Move-Item -Path "$tempDir\*" -Destination $deployDir -Force
            # 删除临时目录
            Remove-Item -Path $tempDir -Recurse -Force -ErrorAction SilentlyContinue
          # 3. 关键：指定执行shell为powershell.exe，彻底绕开Linux shell解析
          command_timeout: 30s
          debug: false