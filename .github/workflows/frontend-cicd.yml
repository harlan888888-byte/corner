name: Frontend CI/CD
on:
  push:
    branches: [ master ]
  workflow_dispatch:
    inputs:
      deploy_only:
        type: boolean
        description: "仅执行部署（跳过构建）"
        required: false
        default: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取代码
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      # 2. 构建前端项目（仅当非「仅部署」时执行）
      - name: 安装 Node.js 环境
        if: ${{ !github.event.inputs.deploy_only }}
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'  # 缓存pnpm依赖（需先安装pnpm才能生效）

      # 关键修正：把pnpm安装步骤移到setup-node之后，且在install之前
      - name: 安装 pnpm
        if: ${{ !github.event.inputs.deploy_only }}
        uses: pnpm/action-setup@v4
        with:
          version: latest
          # 显式指定pnpm安装路径，确保加入PATH
          run_install: false

      - name: 安装项目依赖
        if: ${{ !github.event.inputs.deploy_only }}
        run: pnpm install --frozen-lockfile

      - name: 构建前端产物
        if: ${{ !github.event.inputs.deploy_only }}
        run: pnpm run build

      # 3. 打包 dist 为 tar.gz（带时间戳）
      - name: 打包 dist 为 tar.gz
        if: ${{ !github.event.inputs.deploy_only }}
        run: |
          PACKAGE_NAME="dist-$(date +%Y%m%d%H%M).tar.gz"
          tar -zcvf $PACKAGE_NAME ./dist
          echo "PACKAGE_NAME=$PACKAGE_NAME" >> $GITHUB_ENV

      # 4. SFTP传输tar.gz到Windows服务器
      - name: SFTP传输tar.gz到Windows服务器
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASS }}
          server: ${{ secrets.SERVER_HOST }}
          port: 22
          local_path: "./${{ env.PACKAGE_NAME }}"
          remote_path: "/test/"