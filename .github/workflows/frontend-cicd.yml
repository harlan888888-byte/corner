name: Frontend CI/CD
on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      deploy_only:
        type: boolean
        description: '仅执行部署（跳过构建）'
        required: false
        default: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 核心：用tar.exe绝对路径执行，避开PATH依赖
      - name: 远程解压 1.tar.gz 到当前目录
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASS }}
          port: 22
          script: |
            '
            # Windows系统tar.exe的默认绝对路径（适配你的环境）
            /c/Windows/System32/tar.exe -zxvf /c/phpstudy_pro/WWW/project/vue_project/front/test/1.tar.gz -C /c/phpstudy_pro/WWW/project/vue_project/front/test
            '