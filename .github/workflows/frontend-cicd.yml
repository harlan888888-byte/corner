name: Frontend CI/CD
on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      deploy_only:
        type: boolean
        description: '仅执行部署（跳过构建）'
        required: false
        default: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 核心：用单引号包裹脚本，强制按行执行
      - name: 远程解压 1.tar.gz 到当前目录
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASS }}
          port: 22
          # 方案1：用 tar 命令（Git Bash/OpenSSH 环境）
          script: |
            '
            cd /c/phpstudy_pro/WWW/project/vue_project/front/test
            tar -zxvf 1.tar.gz
            '
          # 方案2：若tar失效，用7-Zip（取消注释使用）
          # script: |
          #   '
          #   cd /c/phpstudy_pro/WWW/project/vue_project/front/test
          #   "/c/Program Files/7-Zip/7z.exe" x 1.tar.gz -y
          #   '