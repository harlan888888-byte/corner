name: Frontend CI/CD (Windows Server 2012 - 最终修复版)
on:
  push:
    branches: [ master ]
  workflow_dispatch:
    inputs:
      deploy_only:
        type: boolean
        description: "仅执行部署（跳过构建）"
        required: false
        default: false

jobs:
  build:
    if: ${{ !github.event.inputs.deploy_only }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - run: pnpm install
      - run: pnpm run build
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/
          retention-days: 7

  deploy:
    needs: build
    if: always() && (success() || github.event.inputs.deploy_only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/

      # ========== 修复：用稳定版scp-action，避免系统误判和tar错误 ==========
      - name: Upload files to Windows Server 2012
        uses: appleboy/scp-action@v0.1.5
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASS }}
          port: 22
          source: "dist/*"
          target: "C:\\phpstudy_pro\\WWW\\vue_project\\temp_dist"
          overwrite: true

      # ========== 修复：用PowerShell执行文件操作，确保Windows识别 ==========
      - name: Execute file operations on server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASS }}
          port: 22
          script: |
            C:\Windows\System32\WindowsPowerShell\v1.0\powershell.exe -Command "
              \$deployDir = 'C:\phpstudy_pro\WWW\vue_project\front'
              \$tempDir = 'C:\phpstudy_pro\WWW\vue_project\temp_dist'

              # 1. 强制清空部署目录
              if (Test-Path \$deployDir) {
                Remove-Item -Path \$deployDir\* -Recurse -Force -ErrorAction SilentlyContinue
              }

              # 2. 强制移动文件
              Move-Item -Path \$tempDir\* -Destination \$deployDir -Force

              # 3. 删除临时目录
              Remove-Item -Path \$tempDir -Recurse -Force -ErrorAction SilentlyContinue

              # 4. 验证部署结果
              Write-Host '部署成功！最新文件修改时间：'
              Get-ChildItem -Path \$deployDir | Select-Object Name, LastWriteTime
            "