# 工作流1：仅构建前端（Node 24、pnpm、自动触发、保存产物）
name: Frontend Build (Node24, pnpm, Only)

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 核心：升级到Node.js 24，移除pnpm缓存（解决缓存校验失败）
      - name: Set Up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          # 移除cache: 'pnpm'，避免Node24缓存不兼容报错

      # 用官方pnpm Action安装，确保Node24兼容
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install Dependencies (pnpm)
        run: pnpm install

      - name: Build (pnpm)
        run: pnpm run build

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/
          retention-days: 7
