name: Frontend CI/CD (Build & Deploy Separate)
on:
  push:
    branches: [ master ]
  workflow_dispatch:
    inputs:
      deploy_only:
        type: boolean
        description: "仅执行部署（需先构建过）"
        required: false
        default: false

jobs:
  build:
    if: ${{ !github.event.inputs.deploy_only }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - run: pnpm install
      - run: pnpm run build
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/
          retention-days: 7

  deploy:
    needs: build
    if: always() && (success() || github.event.inputs.deploy_only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/
      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASS }}
          port: 22
          script: |
            DEPLOY_DIR="/c/phpstudy_pro/WWW/project/vue_project/front"
            TEMP_DIR="/c/phpstudy_pro/WWW/project/vue_project/temp_dist"
            rm -rf "$TEMP_DIR"
            scp -r -O "dist/" "$TEMP_DIR/"
            rm -rf "$DEPLOY_DIR/*"
            mv "$TEMP_DIR"/* "$DEPLOY_DIR/"
            rm -rf "$TEMP_DIR"
            