version: '1.0'
name: pipeline-20260319
displayName: pipeline-20260319
triggers:
  trigger: auto
  push:
    branches:
      prefix:
        - ''
stages:
  - name: stage-42266c36
    displayName: 部署
    strategy: naturally
    trigger: auto
    executor:
      - harlan123
    steps:
      - step: shell@agent
        name: execute_shell
        displayName: Shell 脚本执行
        schedulerType: DISTRIBUTED
        hostGroupID:
          ID: tencent-cloud-win-server
          hostID:
            - ff8c3602-ab77-408b-9e71-68d5f6937bc4
        scriptType: null
        script:
          - '#!/bin/bash'
          - set -e
          - ''
          - '# 1. 拉取你的 Gitee 源码（公开地址）'
          - git clone --depth 1 https://gitee.com/harlan123/corner.git .
          - ''
          - '# 2. 安装 Node.js 20 + pnpm'
          - curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
          - apt-get install -y nodejs
          - npm install -g pnpm
          - ''
          - '# 3. 安装依赖并打包生成 dist（和你本地一样）'
          - export PUPPETEER_SKIP_CHROMIUM_DOWNLOAD=1
          - pnpm install --frozen-lockfile
          - pnpm run build
          - ''
          - '# 4. 安装 scp 工具（云端 Linux 环境需要）'
          - apt-get install -y openssh-client
          - ''
          - '# 5. 把 dist 传到你的 Windows Server 2012！'
          - '# 👇 只需要改这 3 个地方：账号、IP、密码（或者用私钥更安全）'
          - scp -P 22 -r dist/* \
          - '  "administrator@101.33.227.33:C:/phpstudy_pro/WWW/project/vue_project/"'
        gitClone: false
        notify: []
        strategy:
          retry: '0'
