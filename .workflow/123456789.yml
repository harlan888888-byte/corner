version: '1.0'
name: '123456789'
displayName: '1111'
triggers:
  trigger: auto
  push:
    branches:
      prefix:
        - ''
stages:
  - name: stage-cb899d3a
    displayName: '111'
    strategy: naturally
    trigger: auto
    executor: []
    steps:
      - step: execute@docker
        name: execute_by_docker
        displayName: 基于镜像的脚本执行
        certificate: ''
        image: node:20
        command:
          - '#!/bin/bash'
          - set -e
          - ''
          - '# 1. 拉取代码'
          - git clone --depth 1 https://gitee.com/harlan123/corner.git .
          - ''
          - '# 2. 安装 pnpm'
          - npm install -g pnpm
          - ''
          - '# 3. 安装依赖并打包生成 dist'
          - export PUPPETEER_SKIP_CHROMIUM_DOWNLOAD=1
          - pnpm install --frozen-lockfile
          - pnpm run build
          - ''
          - '# 4. 把 dist 传到你的 Windows 服务器'
          - apt-get install -y openssh-client sshpass
          - sshpass -p "你的Windows登录密码" scp -P 22 -r dist/* \
          - '  "administrator@101.33.227.33:C:/phpstudy_pro/WWW/project/vue_project/"'
        artifacts:
          - name: BUILD_ARTIFACT
            path:
              - ./dist
        notify: []
        strategy:
          retry: '0'
